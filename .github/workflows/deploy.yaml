name: "Application Deployment"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      ECR_REPO: atl_apac_mum_dtlk_prod_athena2.0_ecr_01
      IMAGE_TAG: latest
      CONTAINER_NAME: app1
      PORT: 8081

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::185863138492:role/crossaccountb
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push
        run: |
          # Combining these steps is cleaner and faster
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          FULL_IMAGE=$REGISTRY/$ECR_REPO:$IMAGE_TAG
          
          docker build -t $FULL_IMAGE ./app
          docker push $FULL_IMAGE
          echo "IMAGE_URI=$FULL_IMAGE" >> $GITHUB_ENV

      - name: Deploy to EC2 via SSM
        run: |
          # We use env variables directly in the command string to ensure they are expanded
          aws ssm send-command \
            --targets "Key=tag:App,Values=nginx" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying $CONTAINER_NAME to nginx tagged instances" \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}\",
              \"docker stop ${{ env.CONTAINER_NAME }} || true\",
              \"docker rm ${{ env.CONTAINER_NAME }} || true\",
              \"docker pull ${{ env.IMAGE_URI }}\",
              \"docker run -d -p ${{ env.PORT }}:80 --name ${{ env.CONTAINER_NAME }} ${{ env.IMAGE_URI }}\",
              \"docker ps\"
            ]"
