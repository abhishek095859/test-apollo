name: "Application Deployment"

on:
  workflow_dispatch:
  

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      ECR_REPO: atl_apac_mum_dtlk_prod_athena2.0_ecr_01
      IMAGE_TAG: latest
      CONTAINER_NAME: app1
      PORT: 8081

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::185863138492:role/crossaccountb
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $CONTAINER_NAME ./app

      - name: Tag Docker Image
        run: |
          docker tag $CONTAINER_NAME:$IMAGE_TAG \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO:$IMAGE_TAG

      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO:$IMAGE_TAG

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
          --targets "Key=tag:App,Values=nginx" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy application" \
          --parameters commands="[
          \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}\",
          \"docker stop $CONTAINER_NAME || true\",
          \"docker rm $CONTAINER_NAME || true\",
          \"docker pull ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO:$IMAGE_TAG\",
          \"docker run -d -p $PORT:80 --name $CONTAINER_NAME ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO:$IMAGE_TAG\",
          \"docker ps\"
          ]"
