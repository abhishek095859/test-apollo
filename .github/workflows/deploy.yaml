name: "Multi-Repo 3-Tier Deployment"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - folder: "./frontend"
            tag: "web-latest"
            key: "FRONTEND_IMAGE"
          - folder: "./backend"
            tag: "api-latest"
            key: "BACKEND_IMAGE"
          # THIS IS THE PART WE UPDATED BASED ON YOUR IMAGE
          - folder: "./rnd-logic/rnd" 
            tag: "rnd-latest"
            key: "RND_IMAGE"
    outputs:
      FRONTEND_IMAGE: ${{ steps.save.outputs.FRONTEND_IMAGE }}
      BACKEND_IMAGE: ${{ steps.save.outputs.BACKEND_IMAGE }}
      RND_IMAGE: ${{ steps.save.outputs.RND_IMAGE }}
    
    steps:
      - name: Checkout Main Repo (Frontend/Backend)
        uses: actions/checkout@v4

      - name: Checkout Worker Repo
        uses: actions/checkout@v4
        with:
          repository: "abhishek095859/test-cross" # Your repo from the image
          path: "rnd-logic" # The "Box" we put it in

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::185863138492:role/crossaccountb
          aws-region: ap-south-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push
        id: save
        run: |
          REPO_NAME="atl_apac_mum_dtlk_prod_athena2.0_ecr_01"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          FULL_IMAGE=$REGISTRY/$REPO_NAME:${{ matrix.tag }}
          
          docker build -t $FULL_IMAGE ${{ matrix.folder }}
          docker push $FULL_IMAGE
          
          echo "${{ matrix.key }}=$FULL_IMAGE" >> $GITHUB_OUTPUT

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::185863138492:role/crossaccountb
          aws-region: ap-south-1

      - name: Deploy Stack via SSM
        run: |
          COMPOSE_BASE64=$(base64 -w 0 docker-compose.yml)

          aws ssm send-command \
            --targets "Key=tag:project,Values=athena2.0" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 185863138492.dkr.ecr.ap-south-1.amazonaws.com",
              "mkdir -p ~/athena-app",
              "echo \"$COMPOSE_BASE64\" | base64 -d > ~/athena-app/docker-compose.yml",
              "echo \"FRONTEND_IMAGE=${{ needs.build.outputs.FRONTEND_IMAGE }}\" > ~/athena-app/.env",
              "echo \"BACKEND_IMAGE=${{ needs.build.outputs.BACKEND_IMAGE }}\" >> ~/athena-app/.env",
              "echo \"RND_IMAGE=${{ needs.build.outputs.RND_IMAGE }}\" >> ~/athena-app/.env",
              "cd ~/athena-app && docker compose pull",
              "cd ~/athena-app && docker compose up -d",
              "docker ps"
            ]'
